services:
  semantic-search:
    build: .
    container_name: semantic-search-api
    ports:
      - "8000:8000"
    volumes:
      # Mount pre-built models from host into container.
      # Run 'python build.py' on the host first, then start Docker.
      # The container reads from this volume at startup — no re-training needed.
      - ./models:/app/models:ro   # ro = read-only (container never writes models)
    environment:
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - BASE_SIMILARITY_THRESHOLD=0.82
      # HuggingFace cache dir inside container
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s